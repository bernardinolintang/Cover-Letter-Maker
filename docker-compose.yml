services:
  backend:
    build:
      context: ./backend
    container_name: covercraft-backend
    env_file:
      - ./backend/.env
    ports:
      - "3001:3001"
    volumes:
      - backend_uploads:/app/uploads
      - backend_data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: covercraft-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_uploads:
  backend_data:
